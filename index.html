<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Subway Food Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; background: linear-gradient(#1e293b, #334155); }
        #ui { position: absolute; top: 20px; left: 20px; color: #fbbf24; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">FOOD COINS: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = parseInt(localStorage.getItem('userCoins')) || 0;
        scoreEl.innerText = score;

        let gameSpeed = 6;
        let isGameOver = false;

        // Player Object
        const player = {
            x: 50,
            y: canvas.height - 150,
            w: 60,
            h: 90,
            originalH: 90,
            dy: 0,
            jumpForce: 15,
            gravity: 0.8,
            grounded: false,
            isSliding: false,
            slideTimer: 0
        };

        const obstacles = [];
        const types = [
            { icon: "🍕", type: "coin", val: 10 },
            { icon: "🎁", type: "coin", val: 50 },
            { icon: "💣", type: "bomb", val: 0 }
        ];

        // Touch handling
        let touchStartY = 0;
        window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        window.addEventListener('touchend', e => {
            let touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) jump(); // Swipe Up
            if (touchEndY - touchStartY > 50) slide(); // Swipe Down
        });

        // Keyboard handling
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowUp' || e.code === 'Space') jump();
            if (e.code === 'ArrowDown') slide();
        });

        function jump() {
            if (player.grounded && !player.isSliding) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        function slide() {
            if (player.grounded && !player.isSliding) {
                player.isSliding = true;
                player.h = 45; // Half height
                player.y += 45;
                player.slideTimer = 40; // frames
            }
        }

        function spawn() {
            if (Math.random() < 0.03) {
                let t = types[Math.floor(Math.random() * types.length)];
                obstacles.push({
                    x: canvas.width,
                    y: t.type === "bomb" ? canvas.height - 110 : canvas.height - 180 - (Math.random() * 100),
                    data: t,
                    w: 40,
                    h: 40
                });
            }
        }

        function update() {
            if (isGameOver) return;

            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height - 60) {
                player.y = canvas.height - 60 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            if (player.isSliding) {
                player.slideTimer--;
                if (player.slideTimer <= 0) {
                    player.isSliding = false;
                    player.y -= 45;
                    player.h = player.originalH;
                }
            }

            obstacles.forEach((obs, i) => {
                obs.x -= gameSpeed;

                // Collision
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    
                    if (obs.data.type === "bomb") {
                        isGameOver = true;
                        alert("BOOM! You collected " + score + " coins for 2028!");
                        location.reload();
                    } else {
                        score += obs.data.val;
                        scoreEl.innerText = score;
                        localStorage.setItem('userCoins', score);
                        obstacles.splice(i, 1);
                    }
                }
                if (obs.x < -100) obstacles.splice(i, 1);
            });

            spawn();
            gameSpeed += 0.001; // Gradually gets faster
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = "#334155";
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

            // Player (The Boy)
            ctx.fillStyle = "#38bdf8";
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.font = player.isSliding ? "40px Arial" : "60px Arial";
            ctx.fillText("🏃", player.x, player.y + (player.isSliding ? 40 : 60));

            // Obstacles
            obstacles.forEach(obs => {
                ctx.font = "40px Arial";
                ctx.fillText(obs.data.icon, obs.x, obs.y + 35);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
