<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taking a Creative Break | [Your Business Name]</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Dark Navy Professional Background */
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 1px solid #1e293b;
            border-radius: 15px;
            background: rgba(30, 41, 59, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #38bdf8; /* Soft Blue accent */
        }

        blockquote {
            font-size: 1.4rem;
            font-style: italic;
            line-height: 1.6;
            margin: 30px 0;
            color: #e2e8f0;
        }

        cite {
            display: block;
            margin-top: 10px;
            font-size: 1rem;
            color: #94a3b8;
            font-style: normal;
        }

        .re-launch {
            margin-top: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fbbf24; /* Gold accent for the return date */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>A Brief Intermission</h1>
        
        <blockquote>
            "The best way to predict the future is to create it. We are stepping away to build a better version of what we do."
            <cite>— Inspired by Peter Drucker</cite>
        </blockquote>

        <p>Our doors are temporarily closed as we undergo a 2-year transformation.</p>

        <div class="re-launch">Returning in 2028</div>
    </div>

</body>
</html>
