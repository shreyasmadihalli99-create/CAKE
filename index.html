<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavor Runner 2028</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #gameCanvas { background: linear-gradient(#1e293b, #0f172a); border-bottom: 5px solid #38bdf8; cursor: pointer; }
        .stats { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: #fbbf24; }
        .ui { text-align: center; padding: 10px; }
        .instructions { color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="stats">FOOD COLLECTED: <span id="score">0</span></div>
    
    <div class="ui">
        <h2>FLAVOR RUNNER</h2>
        <p class="instructions">Jump over 💣 Bombs. Collect 🍕 Food & 🎁 Gift Cards! <br> (Press SPACE or TAP to Jump)</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = 400;

        let score = parseInt(localStorage.getItem('userCoins')) || 0;
        scoreEl.innerText = score;

        let gameSpeed = 5;
        let isGameOver = false;

        const player = {
            x: 50, y: 300, w: 50, h: 50,
            dy: 0, jumpForce: 12, gravity: 0.6,
            grounded: false, color: '#38bdf8'
        };

        const obstacles = [];
        const items = ["🍕", "🍔", "🍎", "🎁", "💣"];

        function spawnObstacle() {
            const type = items[Math.floor(Math.random() * items.length)];
            obstacles.push({
                x: canvas.width,
                y: 320,
                type: type,
                width: 40,
                collected: false
            });
        }

        function update() {
            if (isGameOver) return;

            // Physics
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y > 300) {
                player.y = 300;
                player.dy = 0;
                player.grounded = true;
            }

            // Move Obstacles
            obstacles.forEach((obs, index) => {
                obs.x -= gameSpeed;

                // Collision detection
                if (player.x < obs.x + obs.width && player.x + player.w > obs.x &&
                    player.y < obs.y + 40 && player.y + player.h > obs.y) {
                    
                    if (obs.type === "💣") {
                        gameOver();
                    } else if (!obs.collected) {
                        obs.collected = true;
                        score += 10;
                        scoreEl.innerText = score;
                        localStorage.setItem('userCoins', score);
                        obstacles.splice(index, 1);
                    }
                }

                if (obs.x < -50) obstacles.splice(index, 1);
            });

            if (Math.random() < 0.02) spawnObstacle();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player (The Boy/Runner)
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.font = "30px Arial";
            ctx.fillText("🏃", player.x + 5, player.y + 35);

            // Draw Obstacles/Items
            obstacles.forEach(obs => {
                ctx.fillText(obs.type, obs.x, obs.y + 30);
            });

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function gameOver() {
            alert("Hit a Bomb! Your food stash is safe in the vault. Try again!");
            location.reload();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        canvas.addEventListener('touchstart', () => {
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        draw();
    </script>
</body>
</html>
